name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Testbed
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_TESTBED }}
        run: |
          curl -X GET "https://ccsfqzxqpnixenihyhhg.supabase.co/rest/v1/settings?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY"
